<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOLVE | 172CM超模计划</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --main: #ff8a78; --dark: #121212; --gray: #1e1e1e; --text: #e0e0e0; }
        body { font-family: -apple-system, "SF Pro Text", sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .app { max-width: 500px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .badge { background: var(--main); color: #000; padding: 4px 12px; border-radius: 12px; font-weight: 800; font-size: 11px; }
        .card { background: var(--gray); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .input-area { width: 100%; background: transparent; border: none; color: white; font-size: 16px; resize: none; outline: none; margin-bottom: 10px; min-height: 80px; }
        button { background: var(--main); border: none; padding: 12px 24px; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; color: #000; }
        button:active { transform: scale(0.96); }
        #ai-response { background: #252525; border-radius: 16px; padding: 15px; margin-top: 15px; display: none; font-size: 14px; border: 1px dashed var(--main); }
        .history-item { padding: 15px; background: #1a1a1a; border-radius: 16px; margin-bottom: 10px; font-size: 13px; }
        .history-date { color: var(--main); font-weight: bold; margin-bottom: 4px; display: block; }
        .settings-btn { text-align: center; color: #555; font-size: 12px; margin-top: 30px; cursor: pointer; text-decoration: underline; }
        .config-panel { display: none; margin-top: 15px; }
        .config-input { background: #000; border: 1px solid #333; color: var(--main); padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div>
            <h1 style="margin:0; letter-spacing: -1px;">EVOLVE 4.1</h1>
            <div style="font-size: 12px; color: #666;">身高 172CM | 目标 70KG | 稳糖作战中</div>
        </div>
        <div id="status-badge" class="badge">READY</div>
    </header>

    <div class="card">
        <textarea id="userInput" class="input-area" placeholder="汇报：午餐吃了什么？今日步数？心情如何？"></textarea>
        <div style="display:flex; justify-content: flex-end; align-items: center; gap: 15px;">
            <span id="loader" style="display:none; font-size:12px; color:var(--main);">正在连线实验室大脑...</span>
            <button id="sendBtn" onclick="askAI()">同步记录</button>
        </div>
        <div id="ai-response"></div>
    </div>

    <div id="history-container"></div>

    <div class="settings-btn" onclick="toggleSettings()">⚙️ 实验室接口配置 (API Setting)</div>
    <div id="config-panel" class="config-panel card">
        <label style="font-size:11px; color:#888;">接口地址 (Base URL)</label>
        <input type="text" id="baseUrl" class="config-input" placeholder="例如: https://api.openai-proxy.org/v1">
        <label style="font-size:11px; color:#888;">API Key</label>
        <input type="password" id="apiKey" class="config-input" placeholder="sk-...">
        <label style="font-size:11px; color:#888;">指定模型 (Model)</label>
        <input type="text" id="modelName" class="config-input" placeholder="例如: gpt-4o-mini 或 deepseek-chat">
        <button onclick="saveConfig()" style="width:100%; background:#444; color:white;">保存并重启实验</button>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('evo_v4_logs')) || [];

    function toggleSettings() {
        const p = document.getElementById('config-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveConfig() {
        localStorage.setItem('evo_baseUrl', document.getElementById('baseUrl').value.trim());
        localStorage.setItem('evo_apiKey', document.getElementById('apiKey').value.trim());
        localStorage.setItem('evo_modelName', document.getElementById('modelName').value.trim());
        alert('配置已生效！');
        toggleSettings();
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const baseUrl = localStorage.getItem('evo_baseUrl') || 'https://api.openai.com/v1';
        const apiKey = localStorage.getItem('evo_apiKey');
        const model = localStorage.getItem('evo_modelName') || 'gpt-4o-mini';

        if (!apiKey) return alert('请先配置 API Key！');
        if (!text) return;

        document.getElementById('sendBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';

        try {
            // 自动补全 /chat/completions 如果用户没写
            const url = baseUrl.endsWith('/') ? baseUrl + 'chat/completions' : baseUrl + '/chat/completions';
            
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        {role: "system", content: "你是一个专业的减脂伴侣。用户172cm，88kg，有胰岛素抵抗。风格：亲切、睿智、略带幽默。你要监督她的进食顺序，鼓励她对抗零食诱惑。"},
                        {role: "user", content: text}
                    ]
                })
            });

            const data = await res.json();
            const aiMsg = data.choices[0].message.content;

            logs.push({ date: new Date().toLocaleString(), user: text, ai: aiMsg });
            localStorage.setItem('evo_v4_logs', JSON.stringify(logs));

            const respBox = document.getElementById('ai-response');
            respBox.innerHTML = marked.parse(aiMsg);
            respBox.style.display = 'block';
            input.value = '';
            render();
        } catch (e) {
            console.error(e);
            alert('连线失败：请检查接口地址和 Key 是否匹配');
        } finally {
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('loader').style.display = 'none';
        }
    }

    function render() {
        const container = document.getElementById('history-container');
        container.innerHTML = logs.slice().reverse().map(log => `
            <div class="history-item">
                <span class="history-date">${log.date}</span>
                <div style="color:#fff; margin-bottom:8px;">“${log.user}”</div>
                <div style="color:#aaa; font-size:12px; border-top:1px solid #333; pt-8px;">${marked.parse(log.ai)}</div>
            </div>
        `).join('');
    }
    
    // 初始化填入配置
    document.getElementById('baseUrl').value = localStorage.getItem('evo_baseUrl') || '';
    document.getElementById('apiKey').value = localStorage.getItem('evo_apiKey') || '';
    document.getElementById('modelName').value = localStorage.getItem('evo_modelName') || '';
    render();
</script>
</body>
</html>
